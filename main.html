<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Retro Flappy Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; margin: 0 auto; image-rendering: pixelated; }
        #ui {
            position: absolute; top: 10%; left: 0; width: 100%;
            text-align: center; color: white; font-size: 60px; font-weight: bold;
            text-shadow: 4px 4px #000; pointer-events: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div id="ui">0</div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('ui');

// Game Settings
let width, height, scale;
const gravity = 0.25;
const jump = -4.8;
let bird, pipes, score, gameRunning, frame, bgOffset = 0;

function resize() {
    height = window.innerHeight;
    width = Math.min(window.innerWidth, height * 0.6);
    canvas.width = width;
    canvas.height = height;
    scale = width / 400;
}

function reset() {
    bird = { x: width * 0.2, y: height / 2, v: 0, w: 34 * scale, h: 24 * scale };
    pipes = [];
    score = 0;
    frame = 0;
    gameRunning = false;
    scoreEl.innerText = "TAP TO START";
    scoreEl.style.fontSize = "30px";
}

function input() {
    if (!gameRunning) {
        gameRunning = true;
        scoreEl.innerText = "0";
        scoreEl.style.fontSize = "60px";
    }
    bird.v = jump;
}

window.addEventListener('mousedown', input);
window.addEventListener('touchstart', (e) => { e.preventDefault(); input(); }, {passive:false});
window.addEventListener('resize', () => { resize(); reset(); });

function drawBackground() {
    // Sky
    ctx.fillStyle = "#70c5ce";
    ctx.fillRect(0, 0, width, height);

    // Procedural Clouds (moving slower than pipes for parallax)
    ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
    for(let i=0; i<5; i++) {
        let x = (i * 200 * scale - (frame * 0.5)) % (width + 200 * scale);
        if (x < -100) x += width + 200;
        ctx.beginPath();
        ctx.arc(x, 100*scale + (i*20), 40*scale, 0, Math.PI*2);
        ctx.arc(x+30*scale, 100*scale + (i*20), 30*scale, 0, Math.PI*2);
        ctx.fill();
    }

    // Cityscape/Floor base
    ctx.fillStyle = "#ded895";
    ctx.fillRect(0, height - 100*scale, width, 100*scale);
}

function drawBird() {
    ctx.save();
    ctx.translate(bird.x + bird.w/2, bird.y + bird.h/2);
    ctx.rotate(Math.min(Math.PI/4, Math.max(-Math.PI/4, bird.v * 0.1)));
    
    // Bird Body (Pixel Look)
    ctx.fillStyle = "#f4d03f"; // Yellow
    ctx.fillRect(-bird.w/2, -bird.h/2, bird.w, bird.h);
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.strokeRect(-bird.w/2, -bird.h/2, bird.w, bird.h);

    // Wing
    ctx.fillStyle = "white";
    ctx.fillRect(-bird.w/2, 0, bird.w/2, bird.h/4);
    
    // Eye
    ctx.fillStyle = "white";
    ctx.fillRect(bird.w/4, -bird.h/3, 8*scale, 8*scale);
    ctx.fillStyle = "black";
    ctx.fillRect(bird.w/4 + 4*scale, -bird.h/3 + 2*scale, 4*scale, 4*scale);

    ctx.restore();
}

function drawPipe(p) {
    const pipeW = 65 * scale;
    const gap = 160 * scale;

    ctx.lineWidth = 3 * scale;
    ctx.strokeStyle = "#000";

    // Style
    ctx.fillStyle = "#73bf2e"; // Green

    // Top Pipe
    ctx.fillRect(p.x, 0, pipeW, p.top);
    ctx.strokeRect(p.x, -10, pipeW, p.top + 10);
    // Top Lip
    ctx.fillRect(p.x - 5, p.top - 20, pipeW + 10, 20);
    ctx.strokeRect(p.x - 5, p.top - 20, pipeW + 10, 20);

    // Bottom Pipe
    ctx.fillRect(p.x, p.top + gap, pipeW, height);
    ctx.strokeRect(p.x, p.top + gap, pipeW, height);
    // Bottom Lip
    ctx.fillRect(p.x - 5, p.top + gap, pipeW + 10, 20);
    ctx.strokeRect(p.x - 5, p.top + gap, pipeW + 10, 20);
}

function loop() {
    drawBackground();

    if (gameRunning) {
        bird.v += gravity;
        bird.y += bird.v;

        if (frame % 100 === 0) {
            pipes.push({ x: width, top: Math.random() * (height - 350*scale) + 50*scale, passed: false });
        }

        pipes.forEach((p, i) => {
            p.x -= 3 * scale;
            drawPipe(p);

            // Collision
            if (bird.x + bird.w > p.x && bird.x < p.x + 65*scale) {
                if (bird.y < p.top || bird.y + bird.h > p.top + 160*scale) reset();
            }
            if (!p.passed && bird.x > p.x + 65*scale) {
                score++; p.passed = true; scoreEl.innerText = score;
            }
        });

        if (pipes.length > 0 && pipes[0].x < -100) pipes.shift();
        if (bird.y + bird.h > height - 100*scale || bird.y < 0) reset();
    }

    drawBird();
    frame++;
    requestAnimationFrame(loop);
}

resize();
reset();
loop();
</script>
</body>
</html>
